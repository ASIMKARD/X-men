/* ============================================================
   DESIGN SYSTEM — "The Pull List"
   Concept: a comic longbox. Era sections are divider cards, the
   way a collector separates runs in a physical box. Signature
   element: the tab-shaped divider header w/ worn-edge notch.
   Palette: cool newsprint cream / true ink black / 11 era accents
   pulled from real associations (Silver Age gold, Krakoa's actual
   hot-pink branding, From-the-Ashes rust, etc).
   Type: Anton (display, used sparingly) + IBM Plex Sans (UI) +
   IBM Plex Mono (data: counts, percents, sort keys).
   ============================================================ */
:root{
  --paper:#E7E4DC; --paper-2:#DEDACF; --ink:#1B1912; --ink-soft:#57544A;
  --line:#C9C4B5; --card:#F2F0E9; --accent:#1C3A5E; --accent-ink:#F2F0E9;
  --danger:#9C4A3C; --shadow:0 1px 2px rgba(27,25,18,.08),0 1px 1px rgba(27,25,18,.06);
  --radius:10px; --radius-sm:6px;
  --font-display:'Anton',sans-serif; --font-body:'IBM Plex Sans',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  --density-gap:10px; --font-scale:1;
}
[data-theme="dark"]{
  --paper:#18161C; --paper-2:#1F1D24; --ink:#EDEAE2; --ink-soft:#A6A296;
  --line:#38353E; --card:#211F27; --accent-ink:#18161C;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper); color:var(--ink); font-family:var(--font-body);
  font-size:calc(15px * var(--font-scale)); line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
::selection{background:var(--accent);color:var(--accent-ink);}

#app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;background:var(--paper);
  border-bottom:2px solid var(--ink);padding:14px 16px 10px;
}
.topbar h1{
  font-family:var(--font-display);font-size:28px;letter-spacing:.5px;margin:0 0 2px;
  text-transform:uppercase;
}
.topbar .subtitle{font-size:12px;color:var(--ink-soft);font-family:var(--font-mono);}
.overall-progress{margin-top:10px;}
.progress-track{height:8px;background:var(--paper-2);border:1px solid var(--line);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--ink);border-radius:99px;transition:width .3s ease;}
.progress-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin-top:4px;}

/* ---------- tab bar ---------- */
.tabbar{
  position:sticky;top:0;z-index:41;display:flex;background:var(--ink);
}
[data-theme="dark"] .tabbar{background:var(--card);border-bottom:2px solid var(--line);}
.tabbar button{
  flex:1;background:none;border:none;color:#cfcabb;padding:11px 4px;
  font-family:var(--font-body);font-weight:600;font-size:12.5px;letter-spacing:.3px;
  text-transform:uppercase;border-bottom:3px solid transparent;
}
[data-theme="dark"] .tabbar button{color:var(--ink-soft);}
.tabbar button.active{color:#fff;border-bottom-color:var(--accent);}
[data-theme="dark"] .tabbar button.active{color:var(--ink);}

/* ---------- filter bar ---------- */
.filterbar{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}
.search-row{display:flex;gap:8px;}
.search-row input[type="text"]{
  flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);color:var(--ink);font-size:14px;
}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.chip{
  padding:5px 11px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);
  font-size:12px;font-weight:600;color:var(--ink-soft);white-space:nowrap;
}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
[data-theme="dark"] .chip.on{background:var(--ink);color:var(--paper);}
.segmented{display:flex;border:1.5px solid var(--ink);border-radius:99px;overflow:hidden;}
.segmented button{flex:1;padding:6px 10px;background:var(--card);border:none;font-size:12px;font-weight:600;color:var(--ink-soft);border-right:1.5px solid var(--ink);}
.segmented button:last-child{border-right:none;}
.segmented button.on{background:var(--ink);color:var(--paper);}
.era-select{padding:6px 10px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);font-size:12px;font-weight:600;color:var(--ink);}
.jump-btn{
  margin-left:auto;padding:6px 12px;border-radius:99px;background:var(--accent);color:var(--accent-ink);
  border:none;font-size:12px;font-weight:700;
}

/* ---------- longbox / era divider (SIGNATURE ELEMENT) ---------- */
.era-divider{
  position:relative;margin:14px 12px 0;cursor:pointer;user-select:none;
  border-radius:8px 8px 3px 3px;overflow:hidden;box-shadow:var(--shadow);
}
.era-divider .tab{
  position:relative;padding:12px 44px 12px 16px;color:var(--tab-ink,#fff);
  clip-path:polygon(0 0,88% 0,100% 100%,0% 100%);
}
.era-divider .tab::after{
  content:"";position:absolute;right:0;top:0;bottom:0;width:14px;
  background:repeating-linear-gradient(135deg,rgba(0,0,0,.12) 0 2px,transparent 2px 6px);
}
.era-divider .era-name{font-family:var(--font-display);font-size:19px;letter-spacing:.4px;text-transform:uppercase;line-height:1.1;}
.era-divider .era-years{font-family:var(--font-mono);font-size:11px;opacity:.85;margin-top:2px;}
.era-divider .era-stats{
  display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);
  font-size:11px;padding:6px 16px;background:rgba(0,0,0,.16);
}
.era-divider .era-progress-track{height:4px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;flex:1;margin:0 10px;}
.era-divider .era-progress-fill{height:100%;background:rgba(255,255,255,.95);}
.era-divider .chevron{position:absolute;right:16px;top:14px;font-size:14px;transition:transform .2s;}
.era-divider.expanded .chevron{transform:rotate(90deg);}
.era-divider .complete-mark{position:absolute;left:16px;top:11px;font-size:13px;display:none;}
.era-divider.complete .complete-mark{display:inline;}
.era-divider.complete .era-name{margin-left:20px;}

.era-body{margin:0 12px;border-left:2px solid var(--line);border-right:2px solid var(--line);border-bottom:2px solid var(--line);border-radius:0 0 8px 8px;background:var(--paper-2);padding:6px;display:none;}
.era-divider.expanded + .era-body{display:block;}
.era-intro{font-size:12.5px;color:var(--ink-soft);font-style:italic;padding:6px 8px 10px;border-bottom:1px dashed var(--line);margin-bottom:6px;}

/* ---------- arc row ("back issue in the bin") ---------- */
.arc-row{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden;}
.arc-head{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer;}
.arc-tab{width:5px;align-self:stretch;border-radius:3px;flex-shrink:0;}
.arc-title{flex:1;min-width:0;}
.arc-title .name{font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.arc-title .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);display:flex;gap:6px;align-items:center;margin-top:1px;}
.type-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;letter-spacing:.3px;text-transform:uppercase;}
.arc-frac{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--ink-soft);white-space:nowrap;}
.info-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:var(--card);font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--ink-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.arc-chevron{font-size:12px;color:var(--ink-soft);flex-shrink:0;transition:transform .2s;}
.arc-row.expanded .arc-chevron{transform:rotate(90deg);}
.arc-blurb{display:none;padding:8px 12px 10px;font-size:12.5px;font-style:italic;color:var(--ink-soft);border-top:1px dashed var(--line);}
.arc-blurb.show{display:block;}
.arc-actions{display:none;padding:0 10px 8px;gap:8px;}
.arc-row.expanded .arc-actions{display:flex;}
.arc-actions button{font-size:11px;font-weight:600;padding:5px 10px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);}
.arc-actions button:hover{border-color:var(--ink);color:var(--ink);}

.issue-list{display:none;border-top:1px solid var(--line);}
.arc-row.expanded .issue-list{display:block;}

/* ---------- issue row ---------- */
.issue-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-bottom:1px solid var(--line);position:relative;}
.issue-row:last-child{border-bottom:none;}
.issue-row.density-compact{padding:4px 10px;}
.issue-row.density-spacious{padding:12px 10px;}
.tri-check{
  width:22px;height:22px;border:2px solid var(--ink);border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--card);
}
.tri-check[data-state="read"]{background:var(--ink);color:var(--paper);}
.tri-check[data-state="skip"]{background:var(--card);color:var(--ink-soft);border-style:dashed;}
body[data-largetouch="1"] .tri-check{width:34px;height:34px;font-size:18px;}
body[data-largetouch="1"] .bookmark-btn{width:34px;height:34px;font-size:22px;}
body[data-dyslexia="1"] .issue-body,body[data-dyslexia="1"] .issue-note,body[data-dyslexia="1"] .setting-label,body[data-dyslexia="1"] .setting-desc{
  font-family:Verdana,'Trebuchet MS',sans-serif;letter-spacing:0.02em;line-height:1.6;
}
.issue-row.combo-badge{border-left:3px solid #B08A1F;}
.issue-row.combo-badge .bookmark-btn.on{color:#8A6A15;text-shadow:0 0 0 1px #8A6A15;}
.table-view .issue-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;padding:4px 10px;font-size:12.5px;}
.table-view .issue-note{display:none;}
.mini-progress-header{position:sticky;top:0;z-index:5;background:var(--paper);padding:6px 10px;border-bottom:1px solid var(--line);}
.mini-progress-header .bar-track{height:4px;background:var(--paper-2);border-radius:2px;overflow:hidden;}
.mini-progress-header .bar-fill{height:100%;background:var(--accent);}
.mini-progress-header .mp-label{font-size:10.5px;color:var(--ink-soft);margin-top:3px;font-family:var(--font-mono);}
.issue-body{flex:1;min-width:0;}
.issue-body .title{font-size:13px;font-weight:500;}
.issue-row.state-read .issue-body .title{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--line);}
.issue-row.state-skip .issue-body .title{color:var(--ink-soft);font-style:italic;}
.issue-note{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
.issue-note.tap-reveal{cursor:pointer;text-decoration:underline dotted var(--line);}
.core-star{color:#B08A1F;font-size:11px;margin-left:4px;}
.bookmark-btn{width:22px;height:22px;flex-shrink:0;border:none;background:none;color:var(--line);font-size:16px;}
.bookmark-btn.on{color:#B08A1F;}
.gapnote-row{padding:5px 10px 5px 41px;font-size:11.5px;font-style:italic;color:var(--ink-soft);border-bottom:1px solid var(--line);background:var(--paper-2);}
.gapnote-row::before{content:"\21B7  ";}

/* swipe affordance */
.issue-row{touch-action:pan-y;}
.issue-row.swiping{transition:none;}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:12px;font-weight:700;border-radius:6px;opacity:0;pointer-events:none;}
.swipe-bg.right{background:#1F7A5C;color:#fff;justify-content:flex-start;}
.swipe-bg.left{background:var(--danger);color:#fff;justify-content:flex-end;}

/* ---------- reading mode ---------- */
.reading-view{padding:24px 20px;display:flex;flex-direction:column;min-height:70vh;}
.reading-counter{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);text-align:center;}
.reading-card{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:10px;padding:20px 0;}
.reading-era-chip{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;color:#fff;}
.reading-title{font-family:var(--font-display);font-size:28px;letter-spacing:.3px;line-height:1.15;}
.reading-arc{font-size:14px;color:var(--ink-soft);}
.reading-note{font-size:13.5px;color:var(--ink-soft);max-width:440px;margin-top:6px;font-style:italic;}
.reading-blurb{font-size:13px;color:var(--ink-soft);max-width:440px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);}
.reading-actions{display:flex;gap:12px;padding:10px 0;}
.reading-actions button{flex:1;padding:16px;font-size:15px;font-weight:700;border-radius:var(--radius);border:2px solid var(--ink);}
.btn-read{background:var(--ink);color:var(--paper);}
.btn-skip{background:var(--card);color:var(--ink);}
.reading-nav{display:flex;justify-content:space-between;padding-top:6px;}
.reading-nav button{background:none;border:none;font-size:13px;font-weight:600;color:var(--ink-soft);padding:8px;}
.reading-empty{text-align:center;padding:60px 20px;color:var(--ink-soft);}

/* ---------- reviews ---------- */
.review-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;margin:10px 12px;}
.review-card .arc{font-weight:600;font-size:13.5px;}
.review-card .era-tag{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);}
.stars{font-size:15px;color:#B08A1F;margin:4px 0;}
.review-text{font-size:13px;color:var(--ink-soft);}
.review-empty{text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:14px;}
.review-edit{width:100%;padding:8px;border:1.5px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:var(--paper);color:var(--ink);resize:vertical;min-height:60px;}
.star-picker{display:flex;gap:4px;margin:6px 0;}
.star-picker button{background:none;border:none;font-size:20px;color:var(--line);padding:0;}
.star-picker button.on{color:#B08A1F;}

/* ---------- settings ---------- */
.settings-section{padding:14px 16px;border-bottom:1px solid var(--line);}
.settings-section h3{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin:0 0 10px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;gap:12px;}
.setting-label{font-size:13.5px;}
.setting-desc{font-size:11px;color:var(--ink-soft);margin-top:1px;}
.toggle{width:42px;height:24px;border-radius:99px;background:var(--line);border:none;position:relative;flex-shrink:0;}
.toggle.on{background:var(--ink);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--card);transition:transform .15s;}
.toggle.on::after{transform:translateX(18px);background:var(--paper);}
.settings-section select,.settings-section button.mini{
  padding:6px 10px;border-radius:6px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:12.5px;
}
.settings-section .row-buttons{display:flex;gap:8px;flex-wrap:wrap;}
.refresh-box{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:var(--font-mono);font-size:10.5px;white-space:pre-wrap;max-height:200px;overflow-y:auto;color:var(--ink-soft);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:99px;font-size:12.5px;font-weight:600;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.toast.show{opacity:1;}

.empty-state{text-align:center;padding:50px 24px;color:var(--ink-soft);}
.empty-state .big{font-family:var(--font-display);font-size:22px;color:var(--ink);margin-bottom:6px;text-transform:uppercase;}

@media (max-width:420px){
  .topbar h1{font-size:24px;}
  .reading-title{font-size:22px;}
}
</style>
</head>

<script id="data-blob" type="application/json">{"eras":[{"code":"FND","name":"Foundations (1963-75)","color":"#A6791E","intro":"This time on X-Men: Professor Xavier gathers five gifted youngsters to master their mutant might, the misshapen Master of Magnetism plots his first moves against them, and a startling roster of strangers is about to storm the stage! From uniformed beginnings to a globe-spanning relaunch, the dream of peaceful coexistence between man and mutant takes its very first steps."},{"code":"CLA","name":"Claremont Era (1975-91)","color":"#A6303C","intro":"This time on X-Men: a scrappy international team assembles under Professor X, a cosmic force of fire and fury claims one of their own, and a future gone horribly wrong sends a warning racing back through time! Savage brawlers and secret assassins clash across a sixteen-year saga that turns outcasts into icons — Wolverine, Rogue, Gambit, and more — and redefines what a superhero team can be."},{"code":"N90","name":"The 90s (1991-2000)","color":"#7B3F94","intro":"This time on X-Men: the best-selling comic book of all time splits the team in two, a young mercenary outfit trades in secrecy for shoulder pads and big guns, and a single ill-fated trip through time unravels reality itself! Sentinels loom, clones scheme, and an entire timeline turns to Apocalypse's iron rule — but heroes have a way of finding their way home."},{"code":"MOR","name":"Morrison and the 2000s (2001-08)","color":"#2C6E8C","intro":"This time on X-Men: a bold new voice tears the team down to its bare essentials, a strange masked visitor changes everything from the shadows, and Xavier's own students turn against him from within! Genosha burns, a phoenix flame flickers back to life, and a single newborn baby becomes the most wanted mutant on Earth."},{"code":"UTO","name":"Utopia Era (2008-12)","color":"#1F7A5C","intro":"This time on X-Men: a rocky island off San Francisco becomes the last refuge of a dying species, a black-ops squad led by Cyclops does the killing nobody else will, and a child messiah holds the fate of every mutant yet to be born! Old friends fall, old wounds reopen, and the team's two greatest minds finally break apart — right before the Avengers come calling."},{"code":"BEN","name":"Bendis to IvX (2012-17)","color":"#B08A1F","intro":"This time on X-Men: five teenage time-travelers arrive from the past to judge the adults they'll become, a beloved berserker meets an ending nobody saw coming, and a line-wide split sends the team down two very different paths! Secrets pile up, loyalties fracture, and a mysterious mist starts turning the very air into poison for every mutant on Earth."},{"code":"RSX","name":"ResurrXion (2017-19)","color":"#C0622A","intro":"This time on X-Men: a rebuilding team splits its roster into gold and blue, old rivals learn to trust each other all over again, and a phoenix long thought lost stirs back to life! Small teams chase big dreams across a fractured line-up — until an entirely new reality, ruled by love and nothing else, swallows the whole cast."},{"code":"KRA","name":"Krakoa Era (2019-24)","color":"#C21E6D","intro":"This time on X-Men: Charles Xavier unveils a living island nation where mutants finally govern themselves, a trio of unbreakable protocols promises an end to death itself, and old enemies are handed seats at the table nobody expected! A golden age rises on Krakoa's shores — but paradise draws powerful enemies, and everything built here will be tested down to its roots."},{"code":"FTA","name":"From the Ashes (2024-25)","color":"#9C4A3C","intro":"This time on X-Men: the dream of Krakoa lies in ashes, and two very different visions rise to take its place — Cyclops rallying a working-class strike team, and Rogue reopening the doors of a haunted mansion! Old ghosts and older grudges come knocking, and Charles Xavier winds up somewhere he never expected to be."},{"code":"AOR","name":"Age of Revelation (2025)","color":"#4A2E5C","intro":"This time on X-Men: gentle, unassuming Cypher accepts a mantle no one imagined he'd wear, a decade-spanning dark future unfolds ten years ahead of schedule, and every corner of mutantkind gets swept into the fight to take it back! Territories fall, rebellions rise, and the line between hero and Horseman blurs like never before."},{"code":"SOT","name":"Shadows of Tomorrow (2026-)","color":"#1C3A5E","intro":"This time on X-Men: the dust from Revelation settles, and a new normal starts to take shape across the line! Old teams find fresh footing, new faces stake their claim, and the long shadow of everything mutantkind has survived stretches over whatever comes next — the ongoing, unfinished story continues, one issue at a time."}],"blurbs":{"FND||Origin":"Decades before the mansion doors ever open, a feral boy in the Canadian wilderness discovers the claws — and the pain — that will one day make him Wolverine.","FND||Silver Age debut":"Professor Xavier's first five students — Cyclops, Marvel Girl, Beast, Angel, and Iceman — learn to master their gifts just as the Master of Magnetism declares war on the world that fears them.","FND||Silver Age growth":"New faces and stranger foes keep finding their way to Xavier's mansion, widening the young team's world one Silver Age adventure at a time.","FND||Thomas-Adams peak":"A bold new creative team pushes the young team's adventures to their moodiest, most ambitious heights yet — right before the lights nearly go out for good.","FND||Silver Age annuals":"Extra-sized annual outings send the original team up against bigger threats and stranger worlds than their regular issues could hold.","FND||Reprint years":"With new stories on hiatus, these reprint issues keep the original team's early adventures in circulation — safe to skip without missing a beat.","FND||The Hidden Years (retro fill-in)":"Decades later, a fill-in series finally answers the question every reader had: what were the original X-Men doing between cancellation and their All-New relaunch?","FND||All-New All-Different":"A rescue mission to a living island brings together an international roster of strangers who will save the original team — and then replace them for good.","CLA||Second Genesis":"Storm, Nightcrawler, Colossus, and a gruff Canadian named Wolverine join forces for the first time, kicking off the sixteen-year run that makes Chris Claremont's name synonymous with the X-Men.","CLA||The Phoenix Saga":"Jean Grey pilots the team home through a wall of solar radiation and comes back reborn as the Phoenix — a power with no ceiling, and no one yet knows how dangerous that might be.","CLA||Byrne era begins / world tour":"John Byrne joins as artist and the team sets off across the globe, sharpening the character work that will carry the book into its greatest stories.","CLA||Proteus Saga":"A reality-warping mutant escapes confinement and starts unraveling the world around him, and only the X-Men stand between Proteus and total collapse.","CLA||Uncanny annuals":"Extra-sized annual outings pit the team against cosmic mischief-makers, ancient threats, and — memorably — an entire nursery of X-Babies.","CLA||The Dark Phoenix Saga":"The power that remade Jean Grey begins remaking her mind, and the team that loves her most may be the only ones who can stop what she's about to become.","CLA||Days of Future Past":"A grim tomorrow ruled by Sentinels sends a desperate warning racing back through time — and the X-Men get exactly one chance to keep that future from ever happening.","CLA||Post-Byrne stretch":"With Byrne gone, the team regroups and even brings an old enemy in from the cold, as Magneto's long war against humanity starts, unexpectedly, to bend toward peace.","CLA||Rogue debuts (elsewhere)":"A power-stealing Southern belle makes her first strike against Ms. Marvel — long before she'll need the X-Men's help to control what she took.","CLA||The Brood Saga":"A rescue mission in deep space turns into a body-horror nightmare, and the New Mutants join the fold just in time to help clean up the wreckage back home.","CLA||Wolverine goes solo":"Logan heads undercover to Madripoor, and Wolverine's first solo outing proves there's a whole lot more to the man than his claws.","CLA||New Mutants founded":"Professor X starts a brand-new class of students, proving the dream doesn't end with just one team of X-Men.","CLA||Morlocks and Madelyne":"A tunnel-dwelling society of outcast mutants surfaces from beneath New York, right as a mysterious redhead who looks an awful lot like Jean Grey enters Scott Summers' life.","CLA||Rogue joins / Japan":"Rogue defects from the Brotherhood to join her former enemies, and a wedding halfway across the world gets violently interrupted before the vows are even said.","CLA||Secret Wars":"Pulled across the galaxy by a mysterious Beyonder, the X-Men side with Magneto against Earth's mightiest heroes on a patchwork Battleworld built for one purpose: war.","CLA||Demon Bear Saga":"A New Mutant's nightmares take terrifying physical form in one of the most visually daring stories the young team will ever face.","CLA||Forge and LifeDeath":"A brilliant, guilt-ridden inventor named Forge enters Storm's life right as her powers vanish — and rebuilding herself without them may be the hardest fight she's ever faced.","CLA||New Mutants annuals":"Extra-sized annual adventures send the New Mutants up against threats too big for a single issue — and introduce a ninja assassin who'll matter a great deal later.","CLA||Kitty Pryde and Wolverine":"Logan takes young Kitty Pryde to Japan to save her from a cult of ninjas, and Shadowcat earns both her hero name and a lifelong bond with the best there is at what he does.","CLA||Legion and the road to the Massacre":"Xavier's unstable, reality-warping son enters the picture, as the New Mutants brush up against a Beyonder-fueled crisis on the way to the X-books' darkest year yet.","CLA||Trial of Magneto / road to the Massacre":"Magneto stands trial for crimes committed long before he sought peace, a dying Xavier makes an astonishing choice about who should run his school, and a certain infant makes his first appearance in the nursery.","CLA||Secret Wars II tie-ins":"The godlike Beyonder returns to Earth for a second helping of cosmic mischief, and this time it's the New Mutants who get caught in the blast radius.","CLA||Asgardian Wars":"A trip to Asgard pits the X-Men and Alpha Flight against gods and giants, in a lavishly illustrated adventure far from Xavier's mansion.","CLA||X-Factor forms":"The original five X-Men reunite as X-Factor — posing as mutant hunters to secretly protect the very mutants they're 'capturing' — while Jean Grey's shocking return from the dead changes everything.","CLA||X-Factor annuals":"Extra-sized team-ups send the original five up against threats worthy of an annual-sized page count.","CLA||Mutant Massacre":"The Marauders descend on the Morlock tunnels with orders to kill everyone inside, and the X-Men arrive too late to stop a slaughter that will haunt the team for years.","CLA||Aftermath and Outback setup":"Shaken by the Massacre, the team regroups under a mysterious new benefactor — even as a genetically engineered mastermind starts pulling strings from the shadows.","CLA||Excalibur launches":"Presumed-dead X-Men Nightcrawler and Shadowcat wash up in England and assemble a scrappy new team with Captain Britain and Meggan — proof the dream survives even when the mansion doesn't.","CLA||Fall of the Mutants: New Mutants":"As the world turns against mutantkind all at once, the New Mutants pay a higher price than a team this young should ever have to.","CLA||Fall of the Mutants: X-Men":"Publicly 'killed' on live television by a demon-lord, the X-Men are reborn in secret — free, for the first time in years, to disappear from the world's radar entirely.","CLA||Fall of the Mutants: X-Factor":"Warren Worthington's darkest hour transforms him into Archangel, Horseman of Death, in a storyline whose echoes reach decades into Apocalypse's mythology.","CLA||Genosha":"The X-Men uncover a nation built on mutant slavery, and Genosha becomes the ugliest mirror the team has ever been forced to look into.","CLA||Wolverine: Patch in Madripoor":"Logan's very first solo ongoing sends him deep undercover in Madripoor's criminal underworld — claws sheathed, instincts as sharp as ever.","CLA||Inferno":"New York's demons come out to play as the Goblin Queen's true identity is revealed, and Madelyne Pryor's tragic unraveling threatens to consume everyone Scott Summers has ever loved.","CLA||Outback dissolution":"A dazzling new mutant named Jubilee stumbles into the team's orbit right as the worn-down, hunted X-Men walk through the mystical Siege Perilous and scatter to the winds.","CLA||Acts of Vengeance / ninja Psylocke":"A line-wide villain team-up catches the X-Men in the crossfire, and Psylocke emerges from the chaos reborn in a body — and a fighting style — nobody expected.","CLA||Cable arrives":"A gun-toting soldier from a war-torn future crashes into the New Mutants' lives, and Cable's arrival reshapes the team, and the entire X-line, for a generation.","CLA||Gambit and the rebuild":"A charming Cajun thief with a mysterious past joins the rebuilding team, as the X-Men slowly climb back from the losses of the Outback years.","CLA||X-Tinction Agenda":"Genosha's mutant-hating regime strikes at the X-Men's newest generation, and old teams reunite to bring their students home by any means necessary.","CLA||Wolverine: Patch and beyond":"Logan's solo adventures deepen as old enemies and older secrets from his past keep finding him, no matter how far undercover he goes.","CLA||Deadpool debuts":"A scarred, motor-mouthed mercenary crashes into the New Mutants' world for the first time — nobody involved yet realizes how big a star Deadpool is about to become.","CLA||Weapon X":"The brutal, wordless story of how a man became a weapon — the adamantium origin, told at last, in Wolverine's darkest and most essential tale.","CLA||Excalibur annuals":"An extra-sized outing gives Britain's scrappiest super-team room to stretch beyond their usual pages.","CLA||Muir Island Saga":"The Shadow King's psychic grip on Muir Island is finally broken, freeing Charles Xavier from his wheelchair and clearing the deck for the biggest X-Men relaunch yet.","CLA||X-Force launch":"The New Mutants graduate into something harder-edged and more dangerous, as Cable rebrands the team X-Force for a new decade of mutant action.","N90||Weapon X":"Fragments of Logan's shattered memory keep surfacing throughout Marvel Comics Presents, piecing together the adamantium nightmare one issue at a time.","N90||Uncanny annuals":"An extra-sized annual outing closes out the Claremont era's tradition of Kings-and-Queens-sized stakes.","N90||Mutant Genesis":"Jim Lee's blockbuster relaunch splits the roster into Blue and Gold strike teams — and becomes the best-selling comic book of all time.","N90||X-Force launch":"Cable's paramilitary young guns hit the ground running, trading in the New Mutants' classroom for gunmetal and attitude.","N90||Wolverine: Patch and beyond":"Logan's solo book digs deeper into his shadowy past, pitting him against old rivals like Sabretooth in some of the character's defining showdowns.","N90||Excalibur: Alan Davis era":"Britain's most British super-team keeps the dream alive with equal parts swashbuckling adventure and off-kilter humor.","N90||X-Factor: government team":"A brand-new roster reinvents X-Factor as a government-sanctioned team under Peter David's beloved, character-driven run.","N90||Bishop arrives":"A hard-edged lawman from a devastated future crosses the timestream in pursuit of a traitor — and stays to become one of the team's most dependable soldiers.","N90||Excalibur annuals":"Extra-sized outings keep the team's offbeat charm running at annual scale.","N90||Omega Red and Wolverine's past":"A Soviet super-soldier with a very personal grudge digs into Wolverine's Cold War history — and doesn't much care what it costs to settle the score.","N90||Uncanny X-Men annuals":"The flagship title's annual tradition rolls on, swinging for bigger stakes than a regular month allows.","N90||X-Factor annuals":"X-Factor's own annual outings keep pace with the team's government-sanctioned adventures.","N90||X-Force annuals":"X-Force takes its mayhem to annual-sized scope — including the first appearance of a rogue's gallery regular.","N90||X-Men (1991) annuals":"The flagship's sister title gets its own annual-sized spotlight, including a fateful first meeting with a certain Cutioner.","N90||X-Cutioner's Song":"A mysterious sniper guns down Xavier in cold blood, and the hunt for the shooter drags four teams into Cable and Stryfe's oldest, bitterest secret.","N90||Cable solo":"Cable steps out from X-Force's shadow into his own title, and the Askani legacy behind his soldier's discipline finally starts to unspool.","N90||Illyana and the Legacy Virus":"A mysterious plague with no cure begins claiming mutant lives, starting with one no one expected to lose so soon.","N90||Fatal Attractions":"Magneto's long-simmering rage finally boils over in an act of violence against Wolverine so brutal it changes the shape of the entire X-line.","N90||Scott and Jean wed":"After more false starts than anyone can count, Cyclops and Jean Grey finally make it down the aisle.","N90||Phalanx Covenant":"A techno-organic hive mind hunts mutantkind's next generation, and a scattered group of teenagers with nowhere else to go finds a new home in the process.","N90||Generation X":"Emma Frost trades her Hellfire Club colors for a faculty badge, mentoring a fresh class of students with a decidedly '90s edge.","N90||Legion Quest":"A desperate trip into the past to save one troubled young man's soul goes catastrophically wrong — and reality itself pays the price.","N90||Age of Apocalypse":"With Xavier erased from history, Apocalypse rules an unrecognizable world — and a scattered handful of survivors must find a way to set the timeline right.","N90||Return and Sabretooth":"The 616 timeline reassembles itself, and the team barely has time to catch its breath before old grudges — and Sabretooth's claws — come calling again.","N90||X-Man":"An Age of Apocalypse survivor finds himself stranded in an unfamiliar world, wielding power that terrifies even him.","N90||Cable: Nicieza and Loeb":"Cable's solo adventures keep pace with the fallout of Genosha and the deepening war against the Legacy Virus.","N90||Wolverine: bone claws and back":"Logan's healing factor and memory both take a beating, as revelations about what's really under his skin start rewriting everything readers thought they knew.","N90||Generation X annuals":"An extra-sized outing gives Xavier's youngest class room to test their powers against bigger threats.","N90||Onslaught":"A psychic entity born from Xavier's darkest impulses declares war on humanity, and the fallout will seemingly cost the Avengers and Fantastic Four their lives.","N90||X-Man annuals":"Nate Grey's solo adventures get their own extra-sized outings, expanding his uneasy life in an unfamiliar world.","N90||Deadpool: Joe Kelly run":"Deadpool finally lands a solo ongoing worthy of the character, and Joe Kelly's run cracks open the heart hiding under all that motor-mouthed chaos.","N90||Operation: Zero Tolerance":"A shadowy anti-mutant task force led by the enigmatic Bastion launches an all-out purge — and no corner of the X-line is safe from the crackdown.","N90||Cable: Ladronn and Robinson":"Cable's soldier's war against the Legacy Virus and its architects grinds on, propelled by some of the era's most striking artwork.","N90||Seagle and Kelly era":"The flagship title heads into leaner, stranger territory, unraveling a long-buried secret about the Mutant Massacre along the way.","N90||X-Men annuals":"The sister flagship's own annual tradition rounds out the decade with extra-sized stakes.","N90||Magneto War":"Magneto seizes control of Genosha once and for all, forcing the X-Men to reckon with their oldest enemy as head of state.","N90||Magneto War and Genosha handover":"The United Nations formally cedes Genosha to Magneto's rule, and the island nation's uneasy new era begins.","N90||Deadpool: Gischler and beyond":"Deadpool's solo chaos rolls on through the turn of the millennium, needling the entire Marvel Universe along the way.","N90||Apocalypse: The Twelve":"Apocalypse makes his boldest play yet, gathering twelve of mutantkind's most powerful to fuel a ritual only he fully understands.","N90||Cable: Soldier X lead-in":"Cable's ongoing war heads toward a rebrand, closing out this volume's numbering on the way to Soldier X.","N90||Claremont's Revolution":"Chris Claremont makes a surprise return to the franchise he built, steering the flagship team through a bold, divisive new direction.","N90||Wolverine: Rucka and Way":"A new creative direction puts Logan back on the streets, chasing down mysteries with a harder, grittier edge.","N90||Search for Cyclops":"With Scott Summers missing and possibly possessed, the team races to track him down before Apocalypse's influence finishes what it started.","N90||Uncanny: Casey and Austen years":"The flagship coasts through a long, divisive stretch — reliably skippable, but never quite boring.","MOR||X-Treme X-Men":"Storm leads a globe-trotting splinter squad on the hunt for Destiny's prophetic diaries — and the secrets inside them prove worth killing for.","MOR||Deadpool: Gischler and beyond":"Deadpool's first ongoing volume winds toward its finale, still finding new ways to be the funniest, saddest book on the stands.","MOR||Cable: Soldier X lead-in":"Cable's rebrand as Soldier X closes out the volume, sending the soldier further from the X-line than he's ever gone.","MOR||E Is for Extinction":"A new voice takes the wheel and immediately raises the stakes to genocide, as Genosha's destruction reshapes the entire mutant world overnight.","MOR||X-Force becomes X-Statix":"A fame-hungry, reality-TV mutant squad claws for ratings as much as survival — and in this book, nobody's safety is guaranteed by their popularity.","MOR||Wolverine: Rucka and Way":"Logan's solo book keeps its street-level grit, chasing conspiracies that hit closer to home than usual.","MOR||Uncanny: Casey and Austen years":"The flagship's long, divisive stretch runs its course — reliably skippable, but the Massacre-secret payoff waiting at its end is worth the patience.","MOR||Exiles":"A reality-hopping strike team led by Blink jumps from timeline to timeline, fixing broken worlds they'll never get to call home.","MOR||New X-Men (2001) annuals":"An extra-sized outing marks a strange new arrival that will loom over Morrison's run for its entire length.","MOR||Germ-Free Generation and Imperiaux":"A secret society of psychic teenage triplets and an alien empire in turmoil both crash into Xavier's newly rebuilt school at once.","MOR||Uncanny X-Men annuals":"The flagship's annual tradition rolls into the new century, still chasing bigger stakes than a regular month allows.","MOR||X-Men (1991) annuals":"One last extra-sized outing closes the book on this title's annual run.","MOR||X-Treme X-Men annuals":"Storm's globe-trotting squad gets its own extra-sized spotlight.","MOR||Interlude issues":"Quieter character-driven issues catch their breath between bigger arcs, introducing a strange new ally who'll matter far more than he first lets on.","MOR||Riot at Xavier's / Murder at the Mansion":"A student's psychic rebellion spirals into tragedy, and a secret affair inside the mansion's walls threatens to break the team from within.","MOR||Wolverine (2003): Rucka and Millar":"A fresh volume sends Logan hunting a brainwashing conspiracy that turns him into a weapon aimed at his own allies.","MOR||Assault on Weapon Plus":"The truth about the shadowy program that built Wolverine goes far, far deeper than adamantium ve there's always an X-Factor nobody saw coming.","MOR||New X-Men: Childhood's End":"The school's newest generation of students grows up fast, as an anti-mutant massacre and unfinished business with a certain feral teenager close in.","MOR||Astonishing: Torn":"A familiar face returns with a stunning secret, and the team's trust in each other gets tested from every direction at once.","MOR||Wolverine: Origins":"Logan's most tangled, soap-operatic solo book unearths a son he never knew he had — and a shadowy figure pulling strings since long before Weapon X.","MOR||Rise and Fall of the Shi'ar Empire":"The Shi'ar throne turns violently unstable, and a Summers family secret from deep space finally claims the crown.","MOR||Exiles annuals":"The reality-hopping squad gets an extra-sized outing between worlds.","MOR||X-Men (2004) annuals":"An extra-sized outing gives the flagship's sister title room to breathe outside its regular pages.","MOR||Endangered Species":"A line-wide backup feature follows Beast's increasingly desperate search for a cure to the mutant population's decline.","MOR||Astonishing: Unstoppable":"Whedon and Cassaday's celebrated run barrels toward its finale, with a send-off that leaves the team — and readers — gutted.","MOR||Wolverine (2003): Get Mystique / Loeb":"Logan's long-simmering history with Mystique finally comes to a head, just as the volume heads toward its own conclusion.","MOR||Messiah Complex":"The birth of the first mutant since M-Day sets off a three-way race between the X-Men, the Purifiers, and a splinter cell that will change the shape of the entire line.","UTO||Wolverine: Origins":"Logan's tangled search for the truth behind Weapon X reaches its endpoint, as the shadowy Romulus's full plan finally comes into view.","UTO||Cable and Deadpool":"The unlikely buddy book winds toward its finale, still finding new ways to wring pathos out of chaos.","UTO||Exiles":"The reality-hopping team's long mission finally reaches the end of the road.", zation's fingerprints turn up on more of Logan's history than he'd like.","UTO||Utopia":"The mutant nation relocates to a reclaimed island off San Francisco, and a new team of Dark X-Men complicates an already fragile peace.","UTO||Necrosha":"The ancient villain Selene raises an army of the mutant dead, and old faces long thought gone for good start walking again.","UTO||Second Coming":"Hope Summers finally comes home to a mutant nation desperate for a savior — and an army of Bastion's Sentinels is waiting for her when she arrives.","UTO||Wolverine (2010): Jason Aaron":"A fresh volume sends Logan literally to Hell and back, kicking off one of his most acclaimed modern runs.","UTO||UXF: The Apocalypse Solution":"A covert strike team led by Storm and Archangel takes on a mission so dark it can never be spoken of again: killing a child version of Apocalypse.","UTO||Generation Hope":"Hope Summers and the Five Lights — the first new mutants born since M-Day — try to figure out what their strange new powers even mean.","UTO||UXF: Deathlok Nation and The World":"Uncanny X-Force's black-ops missions push the team's morality further into the dark, forging an uneasy new ally along the way.","UTO||Schism":"A Sentinel attack on the school forces Cyclops and Wolverine's philosophical divide into the open — and the team splits for good.","UTO||The Dark Angel Saga":"Archangel's darkest impulses finally take full control, and Uncanny X-Force faces an impossible choice about the man they've sworn to protect.","UTO||Wolverine and the X-Men":"Logan opens his own school on the ashes of Xavier's dream, proving even the most reluctant teacher can find his calling.","UTO||Uncanny v2: Gillen":"A newly formed Extinction Team turns mutant power into a public statement — global, unapologetic, and impossible to ignore.","UTO||UXF: Final Execution":"Uncanny X-Force's blackest mission yet forces the team to reckon with everything they've become — and whether they can ever stop.","UTO||Avengers vs X-Men":"The Phoenix Force sets its sights on Hope Summers, and the Avengers and X-Men go to outright war over what to do about it.","UTO||Wolverine (2010): Back in Japan":"Logan's adopted homeland pulls him back in, as old debts and a returning old enemy catch up with him at once.","BEN||Wolverine and the X-Men":"Logan's school keeps growing, proving a place built on second chances can weather just about anything.","BEN||UXF: Final Execution":"Uncanny X-Force's darkest mission reaches its final, costly conclusion, and the squad pays a price no black-ops team walks away from clean.","BEN||Deadpool (2008): Daniel Way":"Deadpool's long-running volume winds toward its close, still gleefully unkillable to the very end.","BEN||Wolverine (2010): Back in Japan":"Logan's adopted homeland keeps pulling him back for one more round with the ghosts of his past.","BEN||All-New X-Men":"The five original X-Men are yanked from the past into the present — and meeting the adults they'll become is not the reunion young Cyclops was hoping for.","BEN||Deadpool (2012): Posehn and Duggan":"Deadpool takes down an army of undead U.S. presidents in a run that somehow smuggles in real heartbreak between the jokes.","BEN||X-Men Legacy: Legion":"Rebranded once more, this volume hands the spotlight to David Haller — Legion — as he tries to build something stable out of a shattered mind.","BEN||Uncanny v3: the revolution":"Cyclops, powers broken and reputation in ruins, leads a new generation of mutants down a defiantly revolutionary path.","BEN||Wolverine (2013): Cornell":"Logan's healing factor starts failing him for the first time ever, and a man who's cheated death his whole life has to face what that really means.","BEN||X-Men (all-women team)":"An all-female roster headlines the flagship for the first time, tackling threats that hit close to home in every sense.","BEN||Battle of the Atom":"Multiple generations of X-Men descend on the present, each with their own demands about where the time-displaced original five belong.","BEN||Amazing X-Men: Quest for Nightcrawler":"A rescue mission to the afterlife sets out to bring a beloved teammate back from the dead — assuming Heaven is willing to let him go.","BEN||The Trial of Jean Grey":"The Shi'ar Empire puts teenage Jean Grey on trial for crimes her adult self hasn't even committed yet.","BEN||Magneto solo":"Stripped of the crown and the costume, Magneto goes it alone as a lethal, unaffiliated avenger for a mutant race he no longer leads.","BEN||Wolverine (2014): Three Months to Die":"With his healing factor gone for good, Logan gets a death sentence and a countdown clock — and decides exactly how he's going to spend it.","BEN||Wolverine (2014): Rot":"Logan's final months wind down fast, as old enemies circle a target who, for the first time, can't just heal his way out of trouble.","BEN||Death of Wolverine":"After decades of surviving the unsurvivable, Logan faces a threat with no adamantium loophole and no healing-factor escape hatch.","BEN||Secret Wars X-tie-ins":"Battleworld's patchwork domains offer twisted, alternate spins on classic mutant stories, tied loosely to the line-wide Secret Wars event.","BEN||Deadpool (2015): World's Greatest":"Deadpool assembles his own ragtag team and somehow becomes Marvel's top-selling hero of the moment — chaos, mercifully, intact.","BEN||All-New Wolverine":"Laura Kinney steps out of X-23's shadow and into the Wolverine mask, carving her own path as the mantle's newest — and most disciplined — bearer.","BEN||Extraordinary X-Men":"A mysterious cloud starts sterilizing mutants worldwide, and a scattered, shorthanded team fights to keep the species from quietly dying out.","BEN||Uncanny v4":"A morally gray roster, assembled by Magneto of all people, tries to hold the line while the world keeps closing in.","BEN||Death of X":"The truth behind Cyclops' death finally comes out — and it's far stranger, and far more devastating, than anyone expected.","BEN||Inhumans vs X-Men":"A toxic cloud that's slowly killing every mutant on Earth forces a war against the very Inhumans whose Terrigen Mists are causing it.","RSX||All-New Wolverine":"Laura Kinney's solo book keeps building her legacy as Wolverine, cloned sister and all.","RSX||Uncanny v4":"Magneto's uneasy roster reaches the end of its road, one final gray-morality mission at a time.","RSX||Extraordinary X-Men":"The fight against mutant extinction reaches a breaking point, as the team's last-ditch efforts to save the species come due.","RSX||Deadpool (2015): World's Greatest":"Deadpool's chart-topping run keeps the hits coming, one glorious mess at a time.","RSX||Cable (2017): Conquest":"A fresh solo volume sends Cable hunting a time-traveling killer, soldier's instincts as sharp as ever.","RSX||X-Men Blue":"The time-displaced original five, now under Magneto's uneasy mentorship, chase a foe determined to erase mutantkind's future.","RSX||X-Men Gold":"A classic-flavored roster reunites for a return to the mansion, old-school adventure with a lighter touch.","RSX||Satellite books":"A wave of smaller-scale ongoings gives new and returning faces alike some overdue solo spotlight.","RSX||Astonishing: Soule":"The Astonishing name returns for a run built around Xavier's own complicated, controversial legacy.","RSX||Despicable Deadpool":"Renumbered back to his legacy count, Deadpool's chaos takes an even more mercenary turn — with a ghost from his past along for the ride.","RSX||Phoenix Resurrection":"After fourteen years gone, the adult Jean Grey claws her way back from the dead — and the whole mutant world has to reckon with what that means.","RSX||Cable (2017): Newer Mutants":"Cable's legacy numbering picks back up, as an older, more familiar version of the soldier returns to the fold.","RSX||X-Men Red (2018)":"Jean Grey leads a globally-minded team dedicated to fixing the world's problems before they start — one crisis at a time.","RSX||X-23 (2018): Family Album":"Laura and her clone-sister Gabby headline together, family drama and mutant action running side by side.","RSX||Deadpool (2018): Skottie Young":"Deadpool's chaos takes an absurdist turn, monster-hunting his way through some of the weirder corners of the Marvel Universe.","RSX||Extermination":"The time-displaced original five finally face the truth: their moment in the present has an expiration date.","RSX||X-Men Disassembled":"The team's fragile unity collapses in real time, right as a mysterious new philosophy starts pulling mutants away one by one.","RSX||X-23 (2018): X-Assassin":"Laura's solo adventures take a darker turn, as her past as a weapon refuses to stay buried.","RSX||Age of X-Man":"An entire cast of mutants wakes up in a love-is-forbidden dystopia with no memory of their old lives — and no idea who's really pulling the strings.","RSX||Uncanny: This Is Forever":"As the team vanishes one by one into a strange new reality, Cyclops and Wolverine hold what's left of the line together for as long as they can.","KRA||Deadpool (2018): Skottie Young":"Deadpool's absurdist run closes out its final issues before the character's next reinvention.","KRA||Uncanny: This Is Forever":"The line's last holdouts make their final stand as the Age of X-Man's grip tightens — and a devastating loss lands right before the dawn of something entirely new.","KRA||House of X / Powers of X":"Charles Xavier unveils a living island nation, a resurrection protocol that promises the end of mutant death, and a hidden history stretching across a thousand years — all at once.","KRA||X-Force v6":"Krakoa's intelligence agency does the ugly, necessary work no press release will ever mention — starting with who really killed Charles Xavier.","KRA||Excalibur v4":"Captain Britain unlocks the mystical realm of Otherworld, and Krakoa's outreach to magic itself proves just as dangerous as its politics.","KRA||Marauders":"Kitty Pryde captains a pirate ship smuggling persecuted mutants to safety, all while running a legitimate trading company as cover.","KRA||New Mutants v4":"A new generation of students gets the classic New Mutants treatment, sci-fi adventure and growing pains in equal measure.","KRA||X-Men: Hickman":"The flagship's new status quo takes center stage, as the Quiet Council's grand designs start reshaping mutant life on a planetary scale.","KRA||Giant-Size specials":"A string of extra-sized one-shots spotlight Krakoa's founding figures, each getting a moment the ongoing books don't have room for.","KRA||Wolverine v7":"Logan takes on Krakoa's off-the-books wetwork, exactly the kind of job only he could ever be trusted with.","KRA||Cable v4":"A teenage version of Cable navigates Krakoa's politics and his own complicated future, all while still figuring out who he wants to become.","KRA||Hellions":"Sinister's court-mandated misfit squad gets group therapy disguised as a mission roster — and it goes about as well as you'd expect.","KRA||X-Factor v4":"A new X-Factor investigates mutant deaths for the resurrection protocols, and not every case closes as cleanly as the paperwork suggests.","KRA||X of Swords":"An ancient, sealed-off realm of Otherworld reopens, and a tournament with impossibly high stakes decides the fate of two worlds at once.","KRA||S.W.O.R.D.":"Abigail Brand's space agency drags mutantkind into interplanetary politics, orbital drama, and a very complicated relationship with a certain Dane Whitman.","KRA||Way of X":"Nightcrawler sets out to build Krakoa a soul, questioning what a nation of resurrection actually means for its citizens' faith.","KRA||Hellfire Gala I / Planet-Size":"Krakoa throws its first annual gala for the world's elite, even as a new mutant world gets terraformed right under everyone's nose.","KRA||X-Men v6: Duggan":"A new flagship era begins as a shadowy anti-mutant organization called Orchis starts making its opening moves.","KRA||Inferno (2021)":"Cracks in the Quiet Council's carefully managed peace finally show, and Moira MacTaggert's best-kept secret comes crashing into the open.","KRA||The Trial of Magneto":"Magneto stands accused of a murder even resurrection can't quite explain away, and Krakoa's justice system faces its first real test.","KRA||X Lives / X Deaths of Wolverine":"Wolverine's original adamantium-bonding origin gets rewritten from the inside, as Moira's ancient rivalry with Destiny finally surfaces.","KRA||Marauders v2":"A new captain takes the ship's wheel, charting fresh waters for Krakoa's smuggling operation.","KRA||Sabretooth and the Exiles":"Locked in the Pit for his crimes, Sabretooth discovers Krakoa's underworld is stranger — and far more dangerous — than anyone above ground realizes.","KRA||Immortal X-Men":"The Quiet Council's private chess match plays out in full, as the mutants really running Krakoa reveal exactly how far they'll go to protect it.","KRA||Knights of X":"Otherworld's throne sits empty, and Captain Britain's found family steps up to defend a realm none of them ever expected to call home.","KRA||X-Men Red v2":"Arakko's fierce new society navigates first contact with the wider world, Storm at the head of a court unlike anything Krakoa ever built.","KRA||Legion of X":"Xavier's son takes on Krakoa's mental health, in a book that treats psychic wellbeing as seriously as any battlefield.","KRA||A.X.E.: Judgment Day":"A cosmic Progenitor wakes up to judge the worthiness of every superhuman on Earth — mutant and Eternal alike.","KRA||Hellfire Gala 2022":"Krakoa's resurrection program goes fully public at the year's biggest gala, and the world's reaction is anything but predictable.","KRA||Deadpool (2022): Alyssa Wong":"Deadpool adopts a flerken-symbiote sidekick named Princess, because of course that's exactly the kind of chaos his life needed next.","KRA||Dark Web":"A demonic corner of the internet threatens to consume mutant and hero alike, dragging Krakoa into a line-wide crisis it didn't start.","KRA||Sins of Sinister":"Mister Sinister's contingency plan for Krakoa's fall unfolds a thousand years into a nightmare future entirely of his own design.","KRA||Hellfire Gala 2023 / the Fall begins":"This year's gala turns into an ambush, as Orchis springs its long-prepared trap on mutantkind's entire elected leadership at once.","KRA||Fall of X: core":"With Krakoa's leadership scattered and the island itself under siege, the X-Men wage a desperate, multi-front war just to survive what Orchis unleashed.","KRA||Fall of X: satellites":"Across the wider Marvel Universe, mutants caught outside Krakoa's borders scramble to survive Orchis's coordinated purge.","KRA||Fall of the House of X / Rise of the Powers of X":"The war for Krakoa reaches its endgame, as Moira's oldest gambit and the island nation's entire experiment both come due at once.","KRA||X-Men Forever (2024)":"An alternate coda imagines how Krakoa's story might have ended, outside the bounds of the main timeline's fall.","KRA||Krakoa finale":"The Krakoan age reaches its final page, as the mutants who built a nation decide, one by one, what comes next.","KRA||Deadpool (2024): Cody Ziglar":"A brand-new Deadpool volume kicks off right as Krakoa's age draws to a close, with a very different kind of family drama waiting in the wings.","FTA||NYX v2":"A scrappy group of unaffiliated mutant teens navigates New York without Krakoa's safety net, finding family in each other instead.","FTA||Phoenix":"A new bearer of the Phoenix Force tries to figure out what the cosmic power means without a mutant nation to fall back on.","FTA||X-Force v7":"A leaner, meaner black-ops squad reassembles for a world where mutants no longer have an island to hide behind.","FTA||X-Men v7":"Cyclops leads a working-class strike team out of Alaska, and a strange new conspiracy starts pulling at threads left over from Krakoa's fall.","FTA||Deadpool (2024): Cody Ziglar":"Deadpool's daughter Ellie steps into the spotlight, proving chaos really does run in the family.","FTA||Wolverine v8":"A shadowy government program called Department H drags Logan back into black-ops territory he thought he'd left behind for good.","FTA||Uncanny X-Men v6":"Rogue reopens the doors of a haunted New Orleans mansion, gathering the world's Outliers under a roof that's seen its share of ghosts.","FTA||X-Factor v5":"A new X-Factor reckons with a mutant world stripped of Krakoa's resurrection safety net for the first time in years.","FTA||Exceptional X-Men":"Kate Pryde and Emma Frost take three fresh students under their wing, proving the dream of Xavier's school never really needed an island to survive.","FTA||FtA minis and solos":"A wave of character-focused miniseries and specials fills in the corners of a mutant world still finding its post-Krakoa footing.","FTA||Storm solo":"Ororo Munroe steps into power on a scale even the X-Men have rarely seen, an Avengers-tier storm all her own.","FTA||Raid on Graymalkin":"Cyclops' and Rogue's teams collide over a shared prisoner, and old rivalries flare right back up the moment they're in the same room.","FTA||Deadpool/Wolverine":"The screen's most famous mutant buddy duo gets a comics tie-in all their own, chaos and healing factors both fully intact.","FTA||X-Manhunt":"A captive Charles Xavier makes a break for freedom, and every corner of the mutant world gets pulled into the search for him.","FTA||Giant-Size X-Men (2025) specials":"A run of extra-sized specials revisits pivotal moments across mutant history, framed through fresh eyes.","FTA||Hellfire Vigil (2025)":"Mutantkind gathers to mourn everything Krakoa cost them, in a memorial gala that closes out the From the Ashes era in style.","FTA||Prologue":"Gentle, unassuming Cypher accepts a mantle nobody saw coming — and the road to Revelation quietly begins.","AOR||Overture":"Ten years into a future nobody chose, the scope of Revelation's Territories comes into full, unsettling view.","AOR||Book of Revelation":"The event's central spine follows the fight to reclaim a fractured world, one Territory at a time.","AOR||Amazing X-Men v3":"A rebellion's spearhead team leads the charge against Revelation's rule, whatever the cost.","AOR||Unbreakable X-Men":"A resilient band of holdouts refuses to bow to the new order, no matter how dark the Territories get.","AOR||Binary":"A cosmic-powered hero navigates Revelation's dark future on a scale few others can match.","AOR||Laura Kinney: Sabretooth":"Laura Kinney wears an unexpected new mantle in this future gone wrong, her past as a weapon more relevant than ever.","AOR||Iron and Frost":"An unlikely alliance forms in the ashes of Revelation's world, tested by everything the future's thrown at it.","AOR||Cloak or Dagger":"A splintered duo faces Revelation's Territories separately, each carrying half of a bond the future tried to break.","AOR||Longshots":"A band of underdogs beats the odds against Revelation's rule, betting everything on luck that's always run thin.","AOR||Radioactive Spider-Man":"A twisted future version of a familiar hero finds an unlikely place in mutantkind's rebellion.","AOR||Rogue Storm":"Two of the X-Men's most powerful women lead their own front in the fight to take back the Territories.","AOR||Expatriate X-Men":"Mutants scattered far from home band together against Revelation's reach, wherever in the world they've landed.","AOR||The Last Wolverine":"A future where healing factors mean less than ever puts Logan's legacy through its harshest test yet.","AOR||Undeadpool":"Even Revelation's dark future can't keep Deadpool down for long — literally.","AOR||X-Vengers":"Mutant and Avenger alike unite against a threat too large for either side to handle alone.","AOR||Sinister's Six":"A rogue's gallery finds its own reasons to fight back against Revelation's new order.","AOR||Omega Kids":"The youngest mutants left in Revelation's world grow up faster than anyone should have to.","AOR||X-Men v7":"The From the Ashes era's flagship team closes out its run right as Revelation's future comes crashing into the present.","AOR||World of Revelation":"An anthology of stories from across the Territories widens the view of just how much Revelation's future has touched.","AOR||Finale":"The dark future comes to a head, and the fight to make sure it never has to happen again reaches its final page.","SOT||Wolverine v8 continues":"Logan's ongoing story picks back up on the other side of Revelation, older wounds and new mysteries both still very much open.","SOT||Uncanny X-Men v6 continues":"Rogue's haunted-mansion team carries on, its anniversary issue marking just how far this era has already come.","SOT||X-Men v7 continues":"The flagship's ongoing story steps into a new normal, Shadows of Tomorrow style, with fresh art and unfinished business alike.","SOT||Cyclops solo":"Scott Summers headlines his own limited series, stepping outside team continuity for a story all his own.","SOT||Magik and Colossus":"The Rasputin siblings share the spotlight in a limited series built entirely around their bond.","SOT||Wade Wilson: Deadpool":"A fresh ongoing take on Wade Wilson keeps the chaos rolling into the current moment.","SOT||Generation X-23":"Laura Kinney and Scout mentor the Facility's newest generation, proving found family can outlast any lab.","SOT||Inglorious X-Force":"A scrappier, less polished black-ops squad picks up the X-Force mantle for the current era.","SOT||X-Men United":"A new hub called Graymatter Lane brings the scattered mutant line back under one roof for the current moment."},"rows":[["19630101","FND","Wolverine: The Origin #1","Origin","SOLO","O",0,"Wolverine's childhood revealed (published 2001-02)","FB"],["19630102","FND","Wolverine: The Origin #2","Origin","SOLO","O",0,"","FB"],["19630103","FND","Wolverine: The Origin #3","Origin","SOLO","O",0,"","FB"],["19630104","FND","Wolverine: The Origin #4","Origin","SOLO","O",0,"","FB"],["19630105","FND","Wolverine: The Origin #5","Origin","SOLO","O",0,"","FB"],["19630106","FND","Wolverine: The Origin #6","Origin","SOLO", };

let state = {

  settings: Object.assign({}, DEFAULT_SETTINGS),

// ---- storage: browser localStorage (STANDALONE BUILD — no Claude account, works fully offline) ----
// This device/browser only. No cross-device sync. Same 3-key batching as the Claude-hosted version.
const STORAGE_KEYS = { progress: 'xmen_progress_v1', reviews: 'xmen_reviews_v1', settings: 'xmen_settings_v1' };
let saveTimers = {};
function debounceSave(name, fn, delay = 400) {
  clearTimeout(saveTimers[name]);
  saveTimers[name] = setTimeout(fn, delay);
}
async function loadAll() {
  try {
    const p = localStorage.getItem(STORAGE_KEYS.progress);
    if (p) {
      const parsed = JSON.parse(p);
      state.progress = parsed.progress || {};
      state.bookmarks = parsed.bookmarks || {};
    }
  } catch (e) { /* key not found on first run — fine */ }
  try {
    const r = localStorage.getItem(STORAGE_KEYS.reviews);
    if (r) state.reviews = JSON.parse(r);
  } catch (e) {}
  try {
    const s = localStorage.getItem(STORAGE_KEYS.settings);
    if (s) {
      const parsed = JSON.parse(s);
      state.settings = Object.assign({}, DEFAULT_SETTINGS, parsed.settings || {});
      state.expandedEras = parsed.expandedEras || {};
      state.presets = parsed.presets || [];
    }
  } catch (e) {}
}
function saveProgress() {
  debounceSave('progress', () => {
    try {
      localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify({ progress: state.progress, bookmarks: state.bookmarks }));
    } catch (e) { console.error('save progress failed', e); }
  });
}
function saveReviews() {
  debounceSave('reviews', () => {
    try { localStorage.setItem(STORAGE_KEYS.reviews, JSON.stringify(state.reviews)); }
    catch (e) { console.error('save reviews failed', e); }
  });
}
function saveSettings() {
  debounceSave('settings', () => {
    try {
      localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify({ settings: state.settings, expandedEras: state.expandedEras, presets: state.presets }));
    } catch (e) { console.error('save settings failed', e); }
  }, 250);
}

// ---- derived helpers ----
function issueState(key) { return state.progress[key] || 'unread'; }
function setIssueState(key, s) {
  if (s === 'unread') delete state.progress[key]; else state.progress[key] = s;
  saveProgress();
}
function cycleState(key) {
  const cur = issueState(key);
  const next = cur === 'unread' ? 'read' : cur === 'read' ? 'skip' : 'unread';
  setIssueState(key, next);
  return next;
}
function toggleBookmark(key) {
  if (state.bookmarks[key]) delete state.bookmarks[key]; else state.bookmarks[key] = true;
  saveProgress();
}

// ============================================================
// Part 2: filtering + stats
// ============================================================
function issueVisible(iss) {
  const s = state.settings;
  if (s.depth === 'core' && !iss.core) return false;
  if (s.depth === 'mandatory' && !iss.mandatory) return false;
  if (iss.type === 'SPIN-OFF' && !s.typeSpinoff) return false;
  if (iss.type === 'SOLO' && !s.typeSolo) return false;
  if (iss.type === 'MINI' && !s.typeMini) return false;
  if (!iss.mandatory && !s.typeOptional) return false;
  if (s.eraFilter !== 'all' && iss.era !== s.eraFilter) return false;
  if (s.unreadOnly && issueState(iss.key) !== 'unread') return false;
  if (s.hideSkipped && issueState(iss.key) === 'skip') return false;
  if (s.landmarksOnly && !iss.note) return false;
  return true;
}
function searchMatch(iss, q) {
  if (!q) return true;
  q = q.toLowerCase();
  return iss.title.toLowerCase().includes(q) || iss.arc.toLowerCase().includes(q);
}
let searchQuery = '';

function getFilteredFlatIssues() {
  const out = [];
  for (const iss of ISSUES) {
    if (iss.isGap) continue;
    if (!issueVisible(iss)) continue;
    if (!searchMatch(iss, searchQuery)) continue;
    out.push(iss);
  }
  return out;
}

// counts per arc (respecting current filters, used for X/Y fractions)
function arcStats(arcNode) {
  let total = 0, read = 0, skip = 0;
  for (const iss of arcNode.issues) {
    if (iss.isGap) continue;
    if (!issueVisible(iss)) continue;
    total++;
    const st = issueState(iss.key);
    if (st === 'read') read++;
    else if (st === 'skip') skip++;
  }
  return { total, read, skip, denom: Math.max(total - skip, 0) };
}
function eraStats(eraNode) {
  let total = 0, read = 0, skip = 0;
  for (const arc of eraNode.arcs) {
    const s = arcStats(arc);
    total += s.total; read += s.read; skip += s.skip;
  }
  return { total, read, skip, denom: Math.max(total - skip, 0) };
}
function overallStats() {
  let total = 0, read = 0, skip = 0;
  for (const eraNode of TREE) {
    const s = eraStats(eraNode);
    total += s.total; read += s.read; skip += s.skip;
  }
  return { total, read, skip, denom: Math.max(total - skip, 0) };
}
function timeRemainingLabel(stats) {
  const remaining = Math.max(stats.total - stats.read - stats.skip, 0);
  const mins = remaining * (state.settings.readingPace || 15);
  if (mins < 60) return mins + 'm';
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + 'h';
  return Math.round(hrs / 24 * 10) / 10 + 'd';
}
function pct(stats) {
  if (stats.denom === 0) return 0;
  return Math.round((stats.read / stats.denom) * 100);
}

function jumpToNextUnread() {
  const flat = getFilteredFlatIssues();
  const next = flat.find(iss => issueState(iss.key) === 'unread');
  if (!next) { showToast('No unread issues match your filters'); return; }
  // expand its era + arc, scroll to it
  state.expandedEras[next.era] = true;
  saveSettings();
  renderChecklist();
  setTimeout(() => {
    const arcEl = document.querySelector(`[data-arckey="${CSS.escape(next.arcKey)}"]`);
    if (arcEl) {
      arcEl.classList.add('expanded');
      renderArcIssueList(arcEl, TREE.find(e => e.code === next.era).arcs.find(a => a.arcKey === next.arcKey));
      const rowEl = document.querySelector(`[data-key="${CSS.escape(next.key)}"]`);
      if (rowEl) { rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); rowEl.style.outline = '2px solid var(--accent)'; setTimeout(() => rowEl.style.outline = '', 1500); }
    }
  }, 60);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function buildEraDivider(eraNode) {

  const div = document.createElement('div');

  div.dataset.era = eraNode.code;
  div.innerHTML = `
    <div class="tab" style="background:${eraNode.color};--tab-ink:#fff;">

  state.presets.push({
    name,
    filters: { depth: s.depth, typeOptional: s.typeOptional, typeSpinoff: s.typeSpinoff, typeSolo: s.typeSolo, typeMini: s.typeMini, unreadOnly: s.unreadOnly, eraFilter: s.eraFilter }
