}

function deletePreset(idx) {
  const preset = state.presets[idx];
  if (!preset) return;
  if (!confirm(`Delete the "${preset.name}" preset?`)) return;
  state.presets.splice(idx, 1);
  saveSettings();
  renderChecklist();
}

function checkForUpdates() {
  if (!('serviceWorker' in navigator)) { showToast('Offline mode not active in this browser'); return; }
  navigator.serviceWorker.getRegistration().then(reg => {
    if (!reg) { showToast('Offline mode not active yet'); return; }
    reg.update().then(() => showToast('Checked — reload the page to use the latest version if one was found'));
  });
}

// ============================================================
// Part 4: CHECKLIST event wiring
// ============================================================
function wireChecklistEvents() {
  const searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.oninput = (e) => {
    const val = e.target.value;
    clearTimeout(window.__searchDebounce);
    window.__searchDebounce = setTimeout(() => { searchQuery = val; refreshEraBodies(); }, 220);
  };
  const jumpBtn = document.getElementById('jumpBtn');
  if (jumpBtn) jumpBtn.onclick = jumpToNextUnread;
  const saveBtn = document.getElementById('savePresetBtn');
  if (saveBtn) saveBtn.onclick = savePreset;
  document.querySelectorAll('[data-applypreset]').forEach(el => {
    el.onclick = (e) => {
      if (e.target.dataset.delpreset !== undefined) return;
      applyPreset(parseInt(el.dataset.applypreset, 10));
    };
  });
  document.querySelectorAll('[data-delpreset]').forEach(el => {
    el.onclick = (e) => { e.stopPropagation(); deletePreset(parseInt(el.dataset.delpreset, 10)); };
  });

  document.getElementById('depthSeg').onclick = (e) => {
    const btn = e.target.closest('[data-depth]');
    if (!btn) return;
    state.settings.depth = btn.dataset.depth;
    saveSettings(); renderChecklist();
  };
  document.querySelectorAll('.toggle-chip').forEach(chip => {
    chip.onclick = () => {
      const key = chip.dataset.toggle;
      state.settings[key] = !state.settings[key];
      saveSettings(); renderChecklist();
    };
  });
  const eraSelect = document.getElementById('eraFilterSelect');
  if (eraSelect) eraSelect.onchange = (e) => {
    state.settings.eraFilter = e.target.value;
    saveSettings(); renderChecklist();
  };
  const eraChipRow = document.getElementById('eraChipRow');
  if (eraChipRow) eraChipRow.onclick = (e) => {
    const btn = e.target.closest('[data-era]');
    if (!btn) return;
    state.settings.eraFilter = btn.dataset.era;
    saveSettings(); renderChecklist();
  };

  // era divider expand/collapse (event delegation on the list)
  const listEl = document.getElementById('eraList');
  listEl.addEventListener('click', (e) => {
    const div = e.target.closest('.era-divider');
    if (div) {
      const code = div.dataset.era;
      const expanded = !state.expandedEras[code];
      state.expandedEras[code] = expanded;
      if (state.settings.rememberExpandedEras) saveSettings();
      div.classList.toggle('expanded', expanded);
      const body = div.parentElement.querySelector('[data-era-body]');
      if (expanded) renderEraBody(body, TREE.find(t => t.code === code));
      return;
    }
    const infoBtn = e.target.closest('[data-info]');
    if (infoBtn) {
      const blurbEl = document.querySelector(`[data-blurb="${cssEsc(infoBtn.dataset.info)}"]`);
      if (blurbEl) blurbEl.classList.toggle('show');
      return;
    }
    const markBtn = e.target.closest('[data-markarc]');
    if (markBtn) {
      bulkMarkArc(markBtn.dataset.markarc, markBtn.dataset.mark);
      return;
    }
    const reviewBtn = e.target.closest('[data-reviewtoggle]');
    if (reviewBtn) {
      toggleReviewPanel(reviewBtn.dataset.reviewtoggle);
      return;
    }
    const arcHead = e.target.closest('.arc-head');
    if (arcHead) {
      const arcRow = arcHead.closest('.arc-row');
      const arcKey = arcRow.dataset.arckey;
      const expanded = arcRow.classList.toggle('expanded');
      if (expanded) {
        const arcNode = findArcNode(arcKey);
        renderArcIssueList(arcRow, arcNode);
        if (state.settings.autoScrollFirstUnread) scrollToFirstUnread(arcRow);
      }
      return;
    }
  });

  // long-press on arc-head for bulk mark
  if (state.settings.longPressBulk) {
    listEl.addEventListener('pointerdown', (e) => {
      const arcHead = e.target.closest('.arc-head');
      if (!arcHead) return;
      const arcRow = arcHead.closest('.arc-row');
      let fired = false;
      const timer = setTimeout(() => {
        fired = true;
        if (navigator.vibrate) { /* haptics intentionally NOT used per spec */ }
        bulkMarkArc(arcRow.dataset.arckey, 'read');
        showToast('Arc marked read (long-press)');
      }, 550);
      const cancel = () => { clearTimeout(timer); arcHead.removeEventListener('pointerup', cancel); arcHead.removeEventListener('pointerleave', cancel); };
      arcHead.addEventListener('pointerup', cancel);
      arcHead.addEventListener('pointerleave', cancel);
    });
  }
}

function findArcNode(arcKey) {
  for (const eraNode of TREE) for (const a of eraNode.arcs) if (a.arcKey === arcKey) return a;
  return null;
}
function cssEsc(s) { return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/(["\\\]\[.#,])/g, '\\$1'); }

function refreshEraBodies() {
  document.querySelectorAll('.era-body').forEach(body => {
    const code = body.dataset.eraBody;
    if (state.expandedEras[code]) {
      const eraNode = TREE.find(t => t.code === code);
      renderEraBody(body, eraNode);
    }
  });
}

function bulkMarkArc(arcKey, mode) {
  const arcNode = findArcNode(arcKey);
  if (!arcNode) return;
  for (const iss of arcNode.issues) {
    if (iss.isGap) continue;
    setIssueState(iss.key, mode === 'read' ? 'read' : 'unread');
  }
  renderChecklist();
  showToast(mode === 'read' ? 'Arc marked read' : 'Arc marked unread');
}

function wireIssueRow(rowEl) {
  const key = rowEl.dataset.key;
  const triBtn = rowEl.querySelector('.tri-check');
  triBtn.onclick = () => {
    const newState = cycleState(key);
    updateIssueRowVisual(rowEl, newState);
    refreshAncestorStats(rowEl);
  };
  const bmBtn = rowEl.querySelector('[data-bookmark]');
  bmBtn.onclick = () => {
    toggleBookmark(key);
    const on = !!state.bookmarks[key];
    bmBtn.classList.toggle('on', on);
    bmBtn.innerHTML = on ? '&#9733;' : '&#9734;';
    renderPinnedBar();
  };
  const noteEl = rowEl.querySelector('[data-revealnote]');
  if (noteEl) {
    const iss = ISSUES.find(i => i.key === key);
    noteEl.onclick = () => { noteEl.textContent = iss.note; noteEl.classList.remove('tap-reveal'); };
  }
  if (state.settings.swipeGestures) attachSwipe(rowEl, key);
}

function updateIssueRowVisual(rowEl, newState) {
  rowEl.className = rowEl.className.replace(/state-\w+/, 'state-' + newState);
  const triBtn = rowEl.querySelector('.tri-check');
  triBtn.dataset.state = newState;
  triBtn.innerHTML = newState === 'read' ? '&#10003;' : newState === 'skip' ? '&#8213;' : '';
}

function refreshAncestorStats(rowEl) {
  const arcRow = rowEl.closest('.arc-row');
  if (arcRow) {
    const arcNode = findArcNode(arcRow.dataset.arckey);
    const stats = arcStats(arcNode);
    arcRow.querySelector('.arc-frac').textContent = `${stats.read}/${stats.total}`;
  }
  const divider = document.querySelector(`.era-divider[data-era="${arcRow ? findArcNode(arcRow.dataset.arckey).era : ''}"]`);
  if (divider) {
    const eraNode = TREE.find(t => t.code === divider.dataset.era);
    const stats = eraStats(eraNode);
    const p = pct(stats);
    divider.classList.toggle('complete', p >= 100 && stats.total > 0);
    const fill = divider.querySelector('.era-progress-fill');
    if (fill) fill.style.width = p + '%';
    const statsSpan = divider.querySelector('.era-stats span');
    if (statsSpan) statsSpan.innerHTML = `${stats.read}/${stats.total} read${stats.skip ? ' &middot; ' + stats.skip + ' skipped' : ''}`;
    const timeSpan = divider.querySelector('.era-stats span:last-child');
    if (timeSpan) timeSpan.textContent = timeRemainingLabel(stats) + ' left';
  }
  updateOverallProgress();
}

// ---- swipe gestures (touch) ----
function attachSwipe(rowEl, key) {
  let startX = 0, dx = 0, active = false;
  const bgRight = rowEl.querySelector('.swipe-bg.right');
  const bgLeft = rowEl.querySelector('.swipe-bg.left');
  rowEl.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX; active = true; rowEl.classList.add('swiping');
  }, { passive: true });
  rowEl.addEventListener('touchmove', (e) => {
    if (!active) return;
    dx = e.touches[0].clientX - startX;
    const body = rowEl.querySelector('.issue-body');
    body.style.transform = `translateX(${dx}px)`;
    if (dx > 0) { bgRight.style.opacity = Math.min(dx / 80, 1); bgLeft.style.opacity = 0; }
    else { bgLeft.style.opacity = Math.min(-dx / 80, 1); bgRight.style.opacity = 0; }
  }, { passive: true });
  rowEl.addEventListener('touchend', () => {
    active = false; rowEl.classList.remove('swiping');
    const body = rowEl.querySelector('.issue-body');
    body.style.transform = ''; bgRight.style.opacity = 0; bgLeft.style.opacity = 0;
    if (dx > 70) { setIssueState(key, 'read'); updateIssueRowVisual(rowEl, 'read'); refreshAncestorStats(rowEl); }
    else if (dx < -70) { setIssueState(key, 'skip'); updateIssueRowVisual(rowEl, 'skip'); refreshAncestorStats(rowEl); }
    dx = 0;
  });
}

function scrollToFirstUnread(arcRowEl) {
  const firstUnread = arcRowEl.querySelector('.issue-row.state-unread');
  if (firstUnread) firstUnread.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ---- pinned (bookmarked) bar ----
function renderPinnedBar() {
  const el = document.getElementById('pinnedBar');
  if (!el) return;
  const keys = Object.keys(state.bookmarks);
  if (keys.length === 0) { el.innerHTML = ''; return; }
  const items = keys.map(k => ISSUES.find(i => i.key === k)).filter(Boolean).slice(0, 12);
  el.innerHTML = `<div class="chip-row" style="padding:8px 16px 0;flex-wrap:nowrap;overflow-x:auto;">
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);align-self:center;">PINNED</span>
    ${items.map(i => `<button class="chip" data-pinjump="${escapeAttr(i.key)}">&#9733; ${i.title}</button>`).join('')}
  </div>`;
  el.querySelectorAll('[data-pinjump]').forEach(btn => {
    btn.onclick = () => {
      const iss = ISSUES.find(i => i.key === btn.dataset.pinjump);
      if (!iss) return;
      state.expandedEras[iss.era] = true; saveSettings();
      renderChecklist();
      setTimeout(() => {
        const arcRow = document.querySelector(`[data-arckey="${cssEsc(iss.arcKey)}"]`);
        if (arcRow) {
          arcRow.classList.add('expanded');
          renderArcIssueList(arcRow, findArcNode(iss.arcKey));
          const rowEl = document.querySelector(`[data-key="${cssEsc(iss.key)}"]`);
          if (rowEl) rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 60);
    };
  });
}

// Part 5: READING MODE tab
// ============================================================
let readingIndex = 0;

function renderReading() {
  const root = document.getElementById('tab-reading');
  const flat = getFilteredFlatIssues();
  if (flat.length === 0) {
    root.innerHTML = `<div class="reading-empty"><div class="empty-state"><div class="big">Nothing here</div>No issues match your current filters. Loosen a filter on the Checklist tab and come back.</div></div>`;
    return;
  }
  if (readingIndex >= flat.length) readingIndex = flat.length - 1;
  if (readingIndex < 0) readingIndex = 0;
  const iss = flat[readingIndex];
  const era = ERA_BY_CODE[iss.era];
  const st = issueState(iss.key);

  root.innerHTML = `
    <div class="reading-view">
      <div class="reading-counter">${readingIndex + 1} of ${flat.length}${st !== 'unread' ? ' &middot; ' + st.toUpperCase() : ''}</div>
      <div class="reading-card">
        <span class="reading-era-chip" style="background:${era.color};">${era.name.split(' (')[0]}</span>
        <div class="reading-title">${iss.title}</div>
        <div class="reading-arc">${iss.arc} &middot; ${iss.type}${iss.core ? ' &middot; \u2605 CORE' : ''}</div>
        ${iss.note ? `<div class="reading-note">${iss.note}</div>` : ''}
        ${BLURBS[iss.arcKey] ? `<div class="reading-blurb">${BLURBS[iss.arcKey]}</div>` : ''}
      </div>
      <div class="reading-actions">
        <button class="btn-skip" id="readSkipBtn">Skip</button>
        <button class="btn-read" id="readReadBtn">${st === 'read' ? 'Read \u2713' : 'Mark Read'}</button>
      </div>
      <div class="reading-nav">
        <button id="readPrevBtn" ${readingIndex === 0 ? 'disabled style="opacity:.3;"' : ''}>&larr; Previous</button>
        <button id="readBookmarkBtn">${state.bookmarks[iss.key] ? '\u2605 Pinned' : '\u2606 Pin for later'}</button>
        <button id="readNextBtn" ${readingIndex === flat.length - 1 ? 'disabled style="opacity:.3;"' : ''}>Next &rarr;</button>
      </div>
    </div>
  `;

  document.getElementById('readReadBtn').onclick = () => { setIssueState(iss.key, 'read'); advanceReading(flat); };
  document.getElementById('readSkipBtn').onclick = () => { setIssueState(iss.key, 'skip'); advanceReading(flat); };
  document.getElementById('readPrevBtn').onclick = () => { readingIndex--; renderReading(); updateOverallProgress(); };
  document.getElementById('readNextBtn').onclick = () => { readingIndex++; renderReading(); updateOverallProgress(); };
  document.getElementById('readBookmarkBtn').onclick = () => { toggleBookmark(iss.key); renderReading(); };
}

function advanceReading(flat) {
  if (readingIndex < flat.length - 1) readingIndex++;
  renderReading();
  updateOverallProgress();
}

document.addEventListener('keydown', (e) => {
  if (currentTab !== 'reading') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const flat = getFilteredFlatIssues();
  if (flat.length === 0) return;
  if (e.key === 'ArrowRight') { if (readingIndex < flat.length - 1) { readingIndex++; renderReading(); } }
  else if (e.key === 'ArrowLeft') { if (readingIndex > 0) { readingIndex--; renderReading(); } }
  else if (e.key.toLowerCase() === 'r') { setIssueState(flat[readingIndex].key, 'read'); advanceReading(flat); }
  else if (e.key.toLowerCase() === 'x') { setIssueState(flat[readingIndex].key, 'skip'); advanceReading(flat); }
});

// Part 6: review entry (from the arc) + MY REVIEWS tab
// ============================================================
function toggleReviewPanel(arcKey) {
  const panel = document.querySelector(`[data-reviewpanel="${cssEsc(arcKey)}"]`);
  if (!panel) return;
  const showing = panel.style.display !== 'none';
  if (showing) { panel.style.display = 'none'; return; }
  const existing = state.reviews[arcKey] || { stars: 0, text: '' };
  const arcNode = findArcNode(arcKey);
  panel.style.display = 'block';
  panel.innerHTML = `
    <div style="padding:10px 12px;border-top:1px dashed var(--line);">
      <div class="star-picker" data-starpicker>
        ${[1, 2, 3, 4, 5].map(n => `<button data-star="${n}" class="${n <= existing.stars ? 'on' : ''}">&#9733;</button>`).join('')}
      </div>
      <textarea class="review-edit" placeholder="What did you think of ${arcNode ? arcNode.name : 'this arc'}?">${existing.text || ''}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button data-savereview="${escapeAttr(arcKey)}" style="padding:6px 14px;border-radius:6px;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);font-size:12px;font-weight:600;">Save review</button>
        ${state.reviews[arcKey] ? `<button data-deletereview="${escapeAttr(arcKey)}" style="padding:6px 14px;border-radius:6px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:12px;">Delete</button>` : ''}
      </div>
    </div>
  `;
  let currentStars = existing.stars;
  const picker = panel.querySelector('[data-starpicker]');
  picker.onclick = (e) => {
    const btn = e.target.closest('[data-star]');
    if (!btn) return;
    currentStars = parseInt(btn.dataset.star, 10);
    picker.querySelectorAll('button').forEach(b => b.classList.toggle('on', parseInt(b.dataset.star, 10) <= currentStars));
  };
  panel.querySelector('[data-savereview]').onclick = () => {
    const text = panel.querySelector('.review-edit').value.trim();
    if (currentStars === 0 && !text) { showToast('Add a rating or a note first'); return; }
    state.reviews[arcKey] = { stars: currentStars, text, arcName: arcNode ? arcNode.name : arcKey, era: arcNode ? arcNode.era : '' };
    saveReviews();
    panel.style.display = 'none';
    const btn = document.querySelector(`[data-reviewtoggle="${cssEsc(arcKey)}"]`);
    if (btn) btn.textContent = 'Edit review';
    showToast('Review saved');
  };
  const delBtn = panel.querySelector('[data-deletereview]');
  if (delBtn) delBtn.onclick = () => {
    delete state.reviews[arcKey];
    saveReviews();
    panel.style.display = 'none';
    const btn = document.querySelector(`[data-reviewtoggle="${cssEsc(arcKey)}"]`);
    if (btn) btn.textContent = 'Rate & review';
    showToast('Review deleted');
    if (currentTab === 'reviews') renderReviews();
  };
}

function renderReviews() {
  const root = document.getElementById('tab-reviews');
  const entries = Object.entries(state.reviews);
  if (entries.length === 0) {
    root.innerHTML = `<div class="review-empty"><div class="empty-state"><div class="big">No reviews yet</div>Expand an arc on the Checklist tab and tap "Rate &amp; review" to leave one.</div></div>`;
    return;
  }
  entries.sort((a, b) => (b[1].stars || 0) - (a[1].stars || 0));
  root.innerHTML = entries.map(([arcKey, rev]) => {
    const era = ERA_BY_CODE[rev.era];
    return `<div class="review-card">
      <div class="era-tag" style="color:${era ? era.color : 'inherit'};">${era ? era.name.split(' (')[0] : ''}</div>
      <div class="arc">${rev.arcName || arcKey}</div>
      <div class="stars">${'\u2605'.repeat(rev.stars || 0)}${'\u2606'.repeat(5 - (rev.stars || 0))}</div>
      ${rev.text ? `<div class="review-text">${escapeHtml(rev.text)}</div>` : ''}
      <button data-editreview="${escapeAttr(arcKey)}" style="margin-top:8px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);">Edit</button>
    </div>`;
  }).join('');
  root.querySelectorAll('[data-editreview]').forEach(btn => {
    btn.onclick = () => {
      const arcKey = btn.dataset.editreview;
      switchTab('checklist');
      const eraCode = arcKey.split('||')[0];
      state.expandedEras[eraCode] = true; saveSettings();
      renderChecklist();
      setTimeout(() => {
        const arcRow = document.querySelector(`[data-arckey="${cssEsc(arcKey)}"]`);
        if (arcRow) { arcRow.scrollIntoView({ behavior: 'smooth', block: 'center' }); toggleReviewPanel(arcKey); }
      }, 80);
    };
  });
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

me from within! Young Kitty Pryde steps\n   into a world of wonder \u2014 but nothing can prepare the X-Men for what the\n   Phoenix is becoming.\" Every arc gets a blurb (MAIN and EVENT included,\n   not just SPIN-OFF/SOLO/MINI). Every era gets a 2-3 sentence intro.\n\n10. DEDUPLICATION GUARANTEE: every issue appears exactly once across the\n    whole dataset (ignoring the intentional GAPNOTE label rows, which are\n    not real issues). Zero duplicate series+issue pairs. Re-run the full\n    validation pass after any change \u2014 duplicates, per-series ascending\n    order (allowing event-boundary and flashback exceptions), and sort-key\n    formatting all must come back clean before re-emitting anything.\n\n11. BUNDLE ROWS stay collapsed to one line (multi-series grab-bag minis,\n    satellite-book waves, etc.) \u2014 do not expand a bundle into individual\n    issues unless explicitly asked to.\n\nCURRENTLY-ONGOING SERIES AS OF THIS DATA'S CUTOFF (July 2026) \u2014\ncheck each of these for issues released after the cutoff and append them\nin place, following all rules above:\n  - X-Men (2024) v7 .......... through #32 (+ 2026 Annual #1)\n  - Uncanny X-Men (2024) v6 ... through #30 (+ 2026 Annual #1)\n  - Wolverine (2024) v8 ....... through #22\n  - Inglorious X-Force ........ through #6\n  - Generation X-23 ........... through #5\n  - X-Men United .............. through #4\n  - Wade Wilson: Deadpool ..... through #5 (Percy's ongoing)\n  - Cyclops (2026) ............ complete at #5 (5-issue limited \u2014 do not\n    expect further issues unless the series is explicitly resolicited)\n  - Magik and Colossus ........ complete at #5 (5-issue limited \u2014 same note)\n\nAlso check whether any NEW ongoing or limited series has launched since the\ncutoff that isn't listed above (Marvel solicitations, ICv2, CBR solicit\ncoverage, or Marvel.com are reliable sources) \u2014 the \"Shadows of Tomorrow\"\nera was still current as of the cutoff; check whether a new named era function bulkMarkEra(eraCode, mode) {
  const eraNode = TREE.find(t => t.code === eraCode);
  if (!eraNode) return;
  const count = eraNode.arcs.reduce((n, arc) => n + arc.issues.filter(i => !i.isGap).length, 0);
  if (!confirm(`Mark all ${count} issues in ${eraNode.name.split(' (')[0]} as ${mode}? This can't be undone in bulk.`)) return;
  for (const arc of eraNode.arcs) for (const iss of arc.issues) { if (!iss.isGap) setIssueState(iss.key, mode); }
  showToast(`${eraNode.name.split(' (')[0]} marked ${mode}`);
  renderChecklist();
}
function bulkMarkRange(fromCode, toCode) {
  const fromIdx = ERAS.findIndex(e => e.code === fromCode), toIdx = ERAS.findIndex(e => e.code === toCode);
  const lo = Math.min(fromIdx, toIdx), hi = Math.max(fromIdx, toIdx);
  const codes = ERAS.slice(lo, hi + 1).map(e => e.code);
  const rangeCount = ISSUES.filter(i => !i.isGap && codes.includes(i.era)).length;
  if (!confirm(`Mark all ${rangeCount} issues from ${ERAS[lo].name.split(' (')[0]} through ${ERAS[hi].name.split(' (')[0]} as read? This can't be undone in bulk.`)) return;
  for (const iss of ISSUES) { if (!iss.isGap && codes.includes(iss.era)) setIssueState(iss.key, 'read'); }
  showToast(`Marked ${ERAS[lo].name.split(' (')[0]} through ${ERAS[hi].name.split(' (')[0]} as read`);
  renderChecklist();
}

function buildProgressBitstring() {
  const totalReal = ISSUES.filter(i => !i.isGap).length;
  const bytes = new Uint8Array(Math.ceil(totalReal * 2 / 8));
  let realIdx = 0;
  for (const iss of ISSUES) {
    if (iss.isGap) continue;
    const st = state.progress[iss.key];
    const val = st === 'read' ? 1 : st === 'skip' ? 2 : 0;
    const bitPos = realIdx * 2, byteIdx = bitPos >> 3, shift = bitPos & 7;
    bytes[byteIdx] |= (val << shift);
    realIdx++;
  }
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary);
}

function showQRModal(svg, title) {
  const existing = document.getElementById('qrModal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'qrModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(27,25,18,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';

}

function exportBackupQR() {
  const packed = buildProgressBitstring();
  const url = `${location.origin}${location.pathname}#sync=${encodeURIComponent(packed)}`;
  const qr = qrcode(0, 'L');
  qr.addData(url);
  qr.make();
  showQRModal(qr.createSvgTag(4, 8), 'Scan on your other device');
}

function exportBackup() {
  const payload = { progress: state.progress, bookmarks: state.bookmarks, reviews: state.reviews, settings: state.settings, expandedEras: state.expandedEras, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'xmen-tracker-backup.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}
function importBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const payload = JSON.parse(reader.result);
      state.progress = payload.progress || {};
      state.bookmarks = payload.bookmarks || {};
      state.reviews = payload.reviews || {};
      state.settings = Object.assign({}, DEFAULT_SETTINGS, payload.settings || {});
      state.expandedEras = payload.expandedEras || {};
      saveProgress(); saveReviews(); saveSettings();
      applyGlobalSettings();
      renderAll();
      showToast('Backup restored');
    } catch (err) { showToast('That file could not be read as a backup'); }
  };
  reader.readAsText(file);
}

let currentTab = 'checklist';

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tabbar button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tabpanel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
  if (name === 'checklist') renderChecklist();
  else if (name === 'reading') { readingIndex = 0; renderReading(); }
  else if (name === 'reviews') renderReviews();
  else if (name === 'settings') renderSettings();
}

function applyGlobalSettings() {
  document.body.setAttribute('data-theme', state.settings.theme);
  document.documentElement.style.setProperty('--font-scale', state.settings.fontSize || 1);
  document.body.setAttribute('data-largetouch', state.settings.largeTapTargets ? '1' : '0');
  document.body.setAttribute('data-dyslexia', state.settings.dyslexiaFont ? '1' : '0');
  document.body.classList.toggle('table-view', !!state.settings.tableView);
  const root = document.documentElement;
  if (state.settings.theme === 'light') {
    const pal = BG_PALETTES[state.settings.bgPalette] || BG_PALETTES.newsprint;
    root.style.setProperty('--paper', pal.paper);
    root.style.setProperty('--paper-2', pal.paper2);
    root.style.setProperty('--card', pal.card);
  } else {
    root.style.removeProperty('--paper');
    root.style.removeProperty('--paper-2');
    root.style.removeProperty('--card');
  }
}

function renderAll() {
  updateOverallProgress();
  if (currentTab === 'checklist') renderChecklist();
  else if (currentTab === 'reading') renderReading();
  else if (currentTab === 'reviews') renderReviews();
  else if (currentTab === 'settings') renderSettings();
}

async function init() {
  const skel = document.getElementById('loadingSkeleton');
  await loadAll();
  applyGlobalSettings();
  document.querySelectorAll('.tabbar button').forEach(btn => {
    btn.onclick = () => switchTab(btn.dataset.tab);
  });
  maybeImportFromHash();
  renderChecklist();
  updateOverallProgress();
  if (skel) skel.style.display = 'none';
}

function maybeImportFromHash() {
  if (!location.hash.startsWith('#sync=')) return;
  try {
    const packed = atob(decodeURIComponent(location.hash.slice(6)));
    const bytes = Uint8Array.from(packed, c => c.charCodeAt(0));
    let readCount = 0, skipCount = 0;
    const bitsPerIssue = 2;
    let realIdx = 0;
    for (const iss of ISSUES) {
      if (iss.isGap) continue;
      const bitPos = realIdx * bitsPerIssue;
      const byteIdx = bitPos >> 3, shift = bitPos & 7;
      const val = (bytes[byteIdx] >> shift) & 0b11;
      const existing = state.progress[iss.key];
      if (val === 1 && existing !== 'read') { state.progress[iss.key] = 'read'; readCount++; }
      else if (val === 2 && !existing) { state.progress[iss.key] = 'skip'; skipCount++; }
      realIdx++;
    }
    saveProgress();
    showToast(`Synced from other device: ${readCount} read, ${skipCount} skipped merged in`);
  } catch (e) { console.warn('Sync import failed', e); }
  history.replaceState(null, '', location.pathname + location.search);
}

init();

// ---- PWA offline layer: installable + true zero-network loads via a real sw.js file ----
// Two-file build: keep index.html and sw.js together in the same folder.
// Requires HTTPS or localhost — browsers block service worker registration on file:// URLs.
// Everything above (tracking, localStorage, all tabs/filters/settings) works with or without
// this; if registration fails or is unsupported, it fails silently and the app is unaffected,
// just without the install prompt / offline cache.
if ('serviceWorker' in navigator && window.isSecureContext) {
  navigator.serviceWorker.register('./sw.js', { scope: './' })
    .then(() => console.log('Pull List: offline mode ready'))
    .catch((e) => console.warn('Pull List: service worker unavailable, app still works normally', e));
}

</script>
</body>
</html>
